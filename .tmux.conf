unbind r
# bind r for reloading config
bind r source-file /home/jin/.tmux.conf

# Changing from C-b Prefix key
set -g prefix C-s
set -g repeat-time 1000

set -g mouse on
set -g default-terminal "xterm-256color"

set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @plugin 'christoomey/vim-tmux-navigator'

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Split panes using Prefix + hjkl
bind h split-window -h -b 
bind l split-window -h   
bind k split-window -v -b
bind j split-window -v  

set-option -g status-position top

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'


# For catppuccin theme config
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"
set -g extended-keys-format csi-u

# Enable focus events for autoread to work
set-option -g focus-events on

# Fix True Color support (assuming terminal supports it)
set-option -a terminal-features 'xterm-256color:RGB'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux configuration file)
run '/home/jin/.tmux/plugins/tpm/tpm'
